<!DOCTYPE html>

<head>

<script src="//ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
<script src="//allison.house/assets/js/jquery.typed.js" type="text/javascript"></script>
<link rel="shortcut icon" href="">
<style>
body {background-color:black}
h1   {color:blue}
p    {color:green}
b    {color:white}
.typed-cursor{
    opacity: 1;
    -webkit-animation: blink 0.7s infinite;
    -moz-animation: blink 0.7s infinite;
    animation: blink 0.7s infinite;
}
.element{
    color:white;
}
@keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-webkit-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-moz-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
</style>
<script>
    $(function(){
        $(".element").typed({
            strings: ["1234567890^2000 \n**********^2000 \nroot@server1: "],
            typeSpeed: 0
        });
    });
</script>
</head>
<body>
<font face="monaco" color="white">login as: root</font></br>
<font face="monaco" color="white">Welcome to server1!</font></br>
<font face="monaco" color="white"></font></br>
<font face="monaco" color="white"></font></br>
<font face="monaco" color="red">Access denied!</font></br>
<font face="monaco" color="white">root@server1's password: </font><span class="blinking-cursor">|</span>
<span class="element"></span>
</body>
